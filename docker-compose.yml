services:
  db:
    image: postgres:16
    container_name: eventlog_db
    environment:
      POSTGRES_DB: eventlog
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d eventlog"]
      interval: 3s
      timeout: 3s
      retries: 10

  # 일회성 배치 컨테이너: db healthy → 50K events + agg INSERT → 종료
  app:
    build: .
    container_name: eventlog_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: eventlog
      DB_USER: app
      DB_PASSWORD: app
    restart: "no"

volumes:
  pgdata:
